name: Bug report
description: Report a reproducible bug.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请不要在公开 issue 中提交真实密钥、Cookie、账号信息、私密链接或未修复安全漏洞利用细节。安全问题请按 SECURITY.md 私有报告。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请提供最小可复现步骤。
      placeholder: |
        1. 启动后端...
        2. 打开前端...
        3. 输入公开视频链接...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、Python、Node.js、浏览器、部署方式等。
    validations:
      required: true
